<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservaciones</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Italianno&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/pages/reservation.css">
</head>

<body>
  <div id="navbar-container"></div>
  <section class="hero">

    <div class="overlay"></div>

    <div class="container">
      <div class="row align-items-center min-vh-100">
        <div class="col-lg-6 text-white">
          <span class="subtitle">Gran experiencia gatronomica</span>
          <h1 class="display-2 fw-bold mb-4">  MIXTECALT</h1>
          <p class="lead">
            Disfrute de una gastronomía excepcional, comidas artesanales
            y un ambiente inolvidable en el corazón de la ciudad.
          </p>

        </div>

        <div class="col-lg-5 offset-lg-1">
          <div class="reservation-card">
            <h2 class="text-center mb-4"> Reserva tu mesa</h2>
            <form>
              <div class="mb-3">
                <label class="form-label"> Nombre completo </label>
                <input type="text" class="form-control" placeholder="Maria Lopez">
              </div>
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label">Numero</label>
                  <input type="tel" class="form-control" placeholder="+1 555 123 4567">
                </div>

                <div class="col-md-6 mb-3">
                  <label class="form-label">  Email</label>
                  <input type="email" class="form-control" placeholder="juan@email.com">
                </div>

              </div>

              <div class="row">
                <div class="col-md-6 mb-3"><label class="form-label">Fecha</label>
                  <input type="date" class="form-control">
                </div>
                <div class="col-md-6 mb-3"><label class="form-label"> Hora</label>
                  <input type="time" class="form-control">
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label"> Numero de comensales </label>

                <select class="form-select" >
                  <option>1 comensal</option>
                  <option>2 comensal</option>
                  <option>3 comensal</option>
                  <option>4 comensal</option>
                  <option>5 comensal</option>
                  <option>6+ comensal</option>
                </select>
              </div>
              <button class="btn btn-gold w-100"> Reserva ahora</button>
            </form>
          </div>

        </div>

      </div>

    </div>

  </section>
  <footer id="footer"></footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script type="module" src="../js/main.js"></script>
  <script type="module" src="../js/pages/reservation.js"></script>
</body>

</html>
