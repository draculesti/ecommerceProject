<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Italianno&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/pages/loginRegiste.css">
</head>

<body>

  <div id="navbar-container"></div>
  <main class="auth-container">

    <section class="auth-card">

      <div class="logo-container">
        <img src="../assets/logo.png" alt="Logo Mixtecalt" class="logo">
      </div>

      <h1 class="project-title">Mixtecalt</h1>

      <h2 class="form-title">Iniciar Sesión</h2>

      <form id="loginForm" novalidate>

        <div class="mb-3">
          <label for="email" class="form-label">
            Correo electrónico
          </label>

          <input type="email" id="email" class="form-control" placeholder="Ej. correo.prueba@gmail.com">

          <small id="errorEmail" class="error-message">
          </small>
        </div>

        <div class="mb-4">
          <label for="password" class="form-label">

            Contraseña

          </label>

          <div class="password-container">

            <input type="password" id="password" class="form-control" placeholder="Ingresa tu contraseña">

            <button type="button" class="password-toggle" id="togglePassword">

              <i class="bi bi-eye"></i>

            </button>

          </div>

          <small id="errorPassword" class="error-message">
          </small>
        </div>

        <div id="mensajeGeneral" class="mb-3">
        </div>

        <button type="submit" class="btn btn-primary w-100">

          Continuar

        </button>

      </form>

      <div class="text-center mt-4">
        <p class="mb-0">
          ¿No tienes una cuenta?
          <a href="registe.html">Regístrate</a>
        </p>
      </div>

    </section>

  </main>

  <script src="../js/pages/login.js"></script>
  <footer id="footer"></footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script type="module" src="../js/main.js"></script>
</body>

</html>
