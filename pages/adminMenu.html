<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Italianno&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/pages/admin-menu.css">
</head>

<body>
  <div id="navbar-container"></div>

  <div id="navbar-container"></div>

  <div class="main-container">

    <div class="form-panel">
      <div class="panel-header-action">
        <h1>Platillos en el menú</h1>

      </div>

      <div class="row align-items-center">
        <div class="col-lg-3 col-md-6 col-sm-12 mb-3">
          <input id="foodIpt" type="text" class="custom-input" placeholder="Nombre">
        </div>
        <div class="col-lg-2 col-md-6 col-sm-12 mb-3">
          <input id="priceIpt" type="text" class="custom-input" placeholder="Precio">
        </div>
        <div class="col-lg-3 col-md-6 col-sm-12 mb-3">
          <input id="categoryIpt" type="text" class="custom-input" placeholder="Categoria">
        </div>

        <div class="col-lg-2 col-md-6 col-sm-12 mb-3 d-flex align-items-center">
          <input id="imageIpt" type="file" accept="image/*" class="hidden-input">
          <span class="image-label-text">Imagen</span>
          <label for="imageIpt" class="btn-custom text-nowrap">
            Cargar Imagen
          </label>
        </div>

        <div class="col-lg-2 col-md-12 col-sm-12 mb-3 text-lg-end">
          <button id="btnAddFood" class="btn-custom w-100">Agregar platillo</button>
        </div>
      </div>
    </div>

    <table class="data-table" id="foodTable">
      <thead>
        <tr>
          <th>Id</th>
          <th>Plato</th>
          <th>Categoría</th>
          <th>Precio</th>
          <th>Imagen</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tableBody">
      </tbody>
    </table>

  </div>

  <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content" style="background-color: #3B5254; color: white; border-radius: 15px;">
        <div class="modal-header" style="border-bottom: 1px solid #587E81;">
          <h5 class="modal-title" id="editModalLabel">Editar Platillo</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="editId">
          <div class="mb-3">
            <label for="editFoodIpt" class="form-label">Nombre del Plato</label>
            <input type="text" id="editFoodIpt" class="custom-input">
          </div>
          <div class="mb-3">
            <label for="editPriceIpt" class="form-label">Precio</label>
            <input type="text" id="editPriceIpt" class="custom-input">
          </div>
          <div class="mb-3">
            <label for="editCategoryIpt" class="form-label">Categoría</label>
            <input type="text" id="editCategoryIpt" class="custom-input">
          </div>
          <div class="mb-3">
            <label class="form-label d-block">Imagen del Platillo</label>
            <input type="file" id="editImageIpt" accept="image/*" class="hidden-input">
            <div class="d-flex align-items-center gap-3">
              <label for="editImageIpt" class="btn-custom">Cambiar Imagen</label>
              <div class="table-image-container" id="editImagePreview" style="width: 75px; height: 50px;">
                <span class="no-image-placeholder">Sin cambio</span>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer d-flex justify-content-between" style="border-top: 1px solid #587E81;">
          <button type="button" id="btnDeleteFood" class="btn btn-danger"
            style="border-radius: 8px; background-color: #DC3545; border: none;">
            Eliminar Platillo
          </button>

          <div>
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"
              style="border-radius: 8px;">Cancelar</button>
            <button type="button" id="btnSaveEdit" class="btn-custom">Guardar Cambios</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <footer id="footer"></footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script type="module" src="../js/main.js"></script>
  <script type="module" src="../js/pages/adminMenu.js"></script>
</body>

</html>
