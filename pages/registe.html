<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registe</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Italianno&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/pages/loginRegiste.css">
</head>

<body>
    <div id="navbar-container"></div>

    <main class="auth-container">

        <section class="auth-card">

            <div class="logo-container">
                <img src="../assets/logo.png" alt="Logo Mixtecalt" class="logo">
            </div>



            <h1 class="project-title">Mixtecalt</h1>

            <h2 class="form-title">Crear Cuenta</h2>

            <form id="registroForm" novalidate>

                <!-- Nombre -->

                <div class="mb-3">

                    <label for="nombre" class="form-label">
                        Nombre completo
                    </label>

                    <input type="text" id="nombre" class="form-control" placeholder="Ej. Juan Pérez">

                    <small id="errorNombre" class="error-message">
                    </small>

                </div>

                <!-- Telefono -->

                <div class="mb-3">

                    <label for="telefono" class="form-label">
                        Número de teléfono
                    </label>

                    <input type="tel" id="telefono" class="form-control" placeholder="Ej. +52 55 1234 5678"
                        maxlength="18">

                    <small id="errorTelefono" class="error-message">
                    </small>

                </div>

                <!-- Email -->

                <div class="mb-3">

                    <label for="email" class="form-label">
                        Correo electrónico
                    </label>

                    <input type="email" id="email" class="form-control" placeholder="Ej. correo.prueba@gmail.com">

                    <small id="errorEmail" class="error-message">
                    </small>

                </div>

                <!-- Contraseña -->

                <div class="mb-3">

                    <label for="password" class="form-label">
                        Contraseña
                    </label>

                    <div class="password-container">

                        <input type="password" id="password" class="form-control" placeholder="Mínimo 8 caracteres">

                        <span class="password-toggle" id="togglePassword">

                            <i class="bi bi-eye"></i>

                        </span>

                    </div>

                    <small id="errorPassword" class="error-message">
                    </small>

                </div>

                <!-- Confirmar contraseña -->

                <div class="mb-4">

                    <label for="confirmPassword" class="form-label">

                        Confirmar contraseña

                    </label>

                    <div class="password-container">

                        <input type="password" id="confirmPassword" class="form-control"
                            placeholder="Repite tu contraseña">

                        <span class="password-toggle" id="toggleConfirmPassword">

                            <i class="bi bi-eye"></i>

                        </span>

                    </div>

                    <small id="errorConfirmPassword" class="error-message">
                    </small>

                </div>

                <!-- Mensaje general -->

                <div id="mensajeGeneral" class="mb-3">
                </div>

                <!-- Botón -->

                <button type="submit" class="btn btn-primary w-100">

                    Registrarse

                </button>

            </form>

            <!-- Link login -->

            <div class="text-center mt-4">

                <p class="mb-0">

                    ¿Ya tienes una cuenta?

                    <a href="login.html">
                        Inicia sesión
                    </a>

                </p>

            </div>

        </section>

    </main>

    <script src="../js/pages/registe.js"></script>
    <footer id="footer"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script type="module" src="../js/main.js"></script>

</body>

</html>
